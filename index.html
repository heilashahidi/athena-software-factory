<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Athena Digital — Software Factory Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  :root { --ink:#1a1a18; --muted:#5f5e5a; --accent:#0F6E56; --violet:#26215C;
          --bg:#fbfbfa; --code-bg:#f4f4f2; --border:#e6e5e1;
          --serif:"Fraunces", Georgia, serif;
          --sans:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font: 16px/1.7 var(--sans);
    -webkit-font-smoothing: antialiased; }
  .layout { max-width:1120px; margin:0 auto; padding:60px 28px 140px;
    display:grid; grid-template-columns:220px minmax(0,1fr); gap:56px; }
  #toc { position:sticky; top:40px; align-self:start; font-size:.85rem;
    max-height:calc(100vh - 80px); overflow-y:auto; }
  #toc .label { font-size:.7rem; font-weight:650; letter-spacing:.14em;
    text-transform:uppercase; color:var(--muted); margin-bottom:.9em; }
  #toc a { display:block; color:var(--muted); text-decoration:none;
    padding:.32em .9em; border-left:2px solid var(--border); line-height:1.4; }
  #toc a:hover { color:var(--ink); }
  #toc a.active { color:var(--accent); border-left-color:var(--accent); font-weight:600; }
  @media (max-width:920px) { .layout { grid-template-columns:minmax(0,1fr); } #toc { display:none; } }
  .wrap { max-width:760px; min-width:0; }
  h1, h2 { font-family:var(--serif); font-weight:600; }
  h1 { font-size:2.7rem; line-height:1.1; margin:0 0 .35em; letter-spacing:-.015em; }
  h1::before { content:""; display:block; width:56px; height:4px; margin-bottom:28px;
    border-radius:2px; background:linear-gradient(90deg, var(--accent), var(--violet)); }
  h1 + p { font-size:1.12rem; line-height:1.6; color:var(--muted);
    padding-bottom:1.6em; border-bottom:1px solid var(--border); }
  h2 { font-size:1.65rem; margin:2.8em 0 .6em; padding-top:1.4em;
       border-top:1px solid var(--border); letter-spacing:-.01em; scroll-margin-top:28px; }
  h3 { font-size:1.18rem; margin:2em 0 .4em; color:var(--violet); letter-spacing:-.008em; }
  h4 { font-size:1.02rem; margin:1.5em 0 .3em; }
  p, li { color:#2a2a28; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  hr { border:none; border-top:1px solid var(--border); margin: 2.6em 0; }
  table { border-collapse: collapse; width:100%; margin:1.3em 0; font-size:.92rem; }
  th, td { border:none; border-bottom:1px solid var(--border);
    padding:10px 14px; text-align:left; vertical-align:top; }
  th { background:#edf4f0; color:#0a4a3a; font-weight:600;
    border-bottom:2px solid var(--accent); }
  code { background:var(--code-bg); padding:.12em .36em; border-radius:4px; font-size:.86em;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  pre { background:var(--code-bg); border:1px solid var(--border); border-radius:8px;
    padding:14px 16px; overflow:auto; font-size:.83rem; line-height:1.55; }
  pre code { background:none; padding:0; font-size:1em; }
  blockquote { margin:1.3em 0; padding:.5em 1.1em; border-left:3px solid var(--accent);
    color:#3a3a37; background:#f5f8f6; border-radius:0 6px 6px 0; }
  blockquote p { margin:.4em 0; }
  .mermaid { margin: 1.6em 0; text-align:center; }
  .mermaid svg { max-width:100%; height:auto; }
  strong { color: var(--ink); font-weight:650; }
  #content.loading, #content.error { color: var(--muted); }
</style>
</head>
<body>
<div class="layout">
  <nav id="toc"></nav>
  <div class="wrap loading" id="content">Rendering…</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
const el = document.getElementById('content');
try {
  const res = await fetch('Software%20Factory%20Architecture.md');
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  el.classList.remove('loading');
  el.innerHTML = marked.parse(await res.text());

  const toc = document.getElementById('toc');
  toc.innerHTML = '<div class="label">Contents</div>';
  const headings = [...el.querySelectorAll('h2')];
  headings.forEach((h, i) => {
    h.id = h.textContent.toLowerCase().replace(/[^\w]+/g, '-').replace(/^-|-$/g, '') || `section-${i}`;
    const a = document.createElement('a');
    a.href = `#${h.id}`;
    a.textContent = h.textContent;
    toc.append(a);
  });
  const links = toc.querySelectorAll('a');
  const spy = () => {
    let current = headings[0];
    headings.forEach(h => { if (h.getBoundingClientRect().top <= 120) current = h; });
    links.forEach(a => a.classList.toggle('active', a.hash === `#${current?.id}`));
  };
  addEventListener('scroll', spy, { passive:true });
  spy();

  el.querySelectorAll('code.language-mermaid').forEach(c => {
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = c.textContent;
    c.closest('pre').replaceWith(div);
  });
  mermaid.initialize({ startOnLoad:false, theme:'base', securityLevel:'loose',
    flowchart:{ htmlLabels:false, useMaxWidth:true, padding:10 },
    themeVariables:{
      fontFamily:'-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif',
      fontSize:'14px',
      background:'#fbfbfa',
      primaryColor:'#E1F5EE', primaryBorderColor:'#0F6E56', primaryTextColor:'#04342C',
      secondaryColor:'#EEEDFE', secondaryBorderColor:'#534AB7', secondaryTextColor:'#26215C',
      tertiaryColor:'#F1EFE8', tertiaryBorderColor:'#5F5E5A', tertiaryTextColor:'#2C2C2A',
      lineColor:'#8a897f', edgeLabelBackground:'#fbfbfa',
      clusterBkg:'#f6f5f1', clusterBorder:'#d8d6cf' } });
  await mermaid.run({ querySelector:'.mermaid' });
} catch (e) {
  el.className = 'wrap error';
  el.textContent = `Could not load "Software Factory Architecture.md": ${e.message}. `
    + `This page reads the Markdown over HTTP, so open it from the served site, not the local file.`;
}
</script>
</body>
</html>
